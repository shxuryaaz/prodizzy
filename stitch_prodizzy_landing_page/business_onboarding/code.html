<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Prodizzy Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5048e5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="flex size-12 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-12">Prodizzy Onboarding</h2>
</div>
<!-- Progress Indicator -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-6">
<div class="h-2.5 w-10 rounded-full bg-primary shadow-[0_0_10px_rgba(80,72,229,0.5)]"></div>
<div class="h-2 w-2 rounded-full bg-primary/20 dark:bg-slate-800"></div>
<div class="h-2 w-2 rounded-full bg-primary/20 dark:bg-slate-800"></div>
</div>
<main class="max-w-3xl mx-auto w-full px-4 pb-20">
<!-- Header Section -->
<div class="mb-10 text-center sm:text-left">
<h1 class="text-slate-900 dark:text-white tracking-tight text-3xl sm:text-4xl font-bold leading-tight mb-3">Tell us about your company</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-normal">Step 1: Build your profile to get personalized recommendations for your startup journey.</p>
</div>
<!-- Form Content -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Company Name -->
<div class="flex flex-col space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Company Name</label>
<input class="w-full rounded-xl border border-primary/20 dark:border-slate-800 bg-white dark:bg-slate-900/50 p-4 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="e.g. Acme Corp" type="text"/>
</div>
<!-- Website -->
<div class="flex flex-col space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Website</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">https://</span>
<input class="w-full rounded-xl border border-primary/20 dark:border-slate-800 bg-white dark:bg-slate-900/50 pl-16 pr-4 py-4 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="acme.com" type="text"/>
</div>
</div>
<!-- Industry -->
<div class="flex flex-col space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Industry</label>
<select class="w-full rounded-xl border border-primary/20 dark:border-slate-800 bg-white dark:bg-slate-900/50 p-4 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all appearance-none">
<option value="">Select industry</option>
<option value="saas">SaaS / Software</option>
<option value="fintech">Fintech</option>
<option value="ai">AI / Machine Learning</option>
<option value="ecommerce">E-commerce</option>
<option value="healthtech">Healthtech</option>
</select>
</div>
<!-- Location -->
<div class="flex flex-col space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Location</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">location_on</span>
<input class="w-full rounded-xl border border-primary/20 dark:border-slate-800 bg-white dark:bg-slate-900/50 pl-12 pr-4 py-4 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="San Francisco, CA" type="text"/>
</div>
</div>
<!-- Team Size -->
<div class="flex flex-col space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Team Size</label>
<div class="grid grid-cols-3 gap-2">
<button class="py-3 px-2 text-sm rounded-lg border border-primary/20 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary hover:bg-primary/5 transition-colors">1-10</button>
<button class="py-3 px-2 text-sm rounded-lg border border-primary/40 bg-primary/10 text-primary font-medium">11-50</button>
<button class="py-3 px-2 text-sm rounded-lg border border-primary/20 dark:border-slate-800 bg-white dark:bg-slate-900/50 hover:border-primary hover:bg-primary/5 transition-colors">51-200</button>
</div>
</div>
<!-- Stage -->
<div class="flex flex-col space-y-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">Company Stage</label>
<select class="w-full rounded-xl border border-primary/20 dark:border-slate-800 bg-white dark:bg-slate-900/50 p-4 text-slate-900 dark:text-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
<option value="idea">Idea Stage</option>
<option selected="" value="mvp">MVP / Beta</option>
<option value="growth">Early Growth</option>
<option value="scale">Scaling</option>
<option value="enterprise">Established</option>
</select>
</div>
</div>
<!-- Illustration / Map Preview -->
<div class="mt-12 rounded-2xl overflow-hidden border border-primary/20 dark:border-slate-800 aspect-video relative group">
<img alt="World map representation" class="w-full h-full object-cover opacity-60 grayscale group-hover:grayscale-0 transition-all duration-700" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPq_GivszmEK1c9yvIRtgQ5WMQ-UHy8iOJVr6S0LX-maRACP5WXA_YWIVLGluEUKC-idstR4VfTM0GY5dejNs3R49V91PYRE7vYeclcz7rRuGWCuAi_Ubjnd7k0a1bEWRE9ZVFaMbtvpqw31cY-xLCTUG3z5znCyCauWQW-Ewd8gmJ3q87LyhRRBRhiJbiAMDpFy0BNIBlvynu1Z8gt8tnf7SU9gq2kY8yXO7-BUDop7zoE6zzax8B4yXgW2zjHInIAutKg7az1fxo"/>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent to-transparent"></div>
<div class="absolute bottom-6 left-6 right-6">
<p class="text-white text-sm font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-primary">verified</span>
                        This information helps us tailor your workspace.
                    </p>
</div>
</div>
<!-- Footer Action -->
<div class="mt-12 flex flex-col sm:flex-row items-center justify-between gap-6 py-6 border-t border-primary/10">
<div class="flex items-center gap-2 text-slate-500">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-xs">Your data is stored securely.</span>
</div>
<button class="w-full sm:w-auto px-10 py-4 bg-primary text-white rounded-xl font-bold shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:translate-y-[-2px] transition-all flex items-center justify-center gap-2 group">
                    Continue to Step 2
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- Subtle background elements -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[30%] h-[30%] bg-primary/5 blur-[100px] rounded-full pointer-events-none"></div>
</div>
</body></html>
