<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Prodizzy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5048e5",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col items-center justify-center p-4">
<div class="w-full max-w-[480px] space-y-8 bg-white dark:bg-slate-900/40 p-8 rounded-xl border border-slate-200 dark:border-primary/20 backdrop-blur-sm shadow-2xl">
<div class="flex flex-col items-center gap-4">
<div class="flex size-14 items-center justify-center rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined !text-4xl">rocket_launch</span>
</div>
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Prodizzy</h2>
</div>
<div class="text-center space-y-2">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Welcome back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please enter your details to sign in</p>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-300 dark:border-primary/20 bg-transparent py-2.5 text-sm font-semibold text-slate-700 dark:text-slate-200 transition hover:bg-slate-50 dark:hover:bg-primary/10">
<span class="material-symbols-outlined !text-lg">google</span>
                Google
            </button>
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-300 dark:border-primary/20 bg-transparent py-2.5 text-sm font-semibold text-slate-700 dark:text-slate-200 transition hover:bg-slate-50 dark:hover:bg-primary/10">
<span class="material-symbols-outlined !text-lg">work</span>
                LinkedIn
            </button>
</div>
<div class="relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-300 dark:border-primary/20"></div>
</div>
<div class="relative flex justify-center text-sm font-medium leading-6">
<span class="bg-white dark:bg-[#121121] px-4 text-slate-500">or login with email</span>
</div>
</div>
<form class="space-y-5">
<div>
<label class="block text-sm font-medium leading-6 text-slate-900 dark:text-slate-200" for="email">Email address</label>
<div class="mt-1">
<input autocomplete="email" class="block w-full rounded-lg border border-slate-300 dark:border-primary/30 bg-white dark:bg-slate-800/50 py-3 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary sm:text-sm" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between">
<label class="block text-sm font-medium leading-6 text-slate-900 dark:text-slate-200" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary/80" href="#">Forgot password?</a>
</div>
<div class="mt-1">
<input autocomplete="current-password" class="block w-full rounded-lg border border-slate-300 dark:border-primary/30 bg-white dark:bg-slate-800/50 py-3 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary sm:text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="flex w-full justify-center rounded-lg bg-primary px-3 py-3 text-sm font-bold leading-6 text-white shadow-sm hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary" type="submit">
                Sign in
            </button>
</form>
<div class="pt-6 border-t border-slate-300 dark:border-primary/10">
<p class="text-center text-sm text-slate-500 dark:text-slate-400 mb-6">
                Don't have an account? <span class="font-semibold text-primary">Sign up below</span>
</p>
<div class="space-y-3">
<p class="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 text-center">Select your account type</p>
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-300 dark:border-primary/20 bg-slate-50 dark:bg-primary/5 hover:border-primary transition group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">person</span>
<span class="text-xs font-bold text-slate-900 dark:text-slate-100">Individual</span>
</button>
<button class="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-300 dark:border-primary/20 bg-slate-50 dark:bg-primary/5 hover:border-primary transition group">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">corporate_fare</span>
<span class="text-xs font-bold text-slate-900 dark:text-slate-100">Business</span>
</button>
</div>
</div>
</div>
</div>
<footer class="mt-12 text-slate-500 dark:text-slate-600 text-xs">
        © 2024 Prodizzy Inc. All rights reserved.
    </footer>
</div>
<div class="fixed top-0 left-0 -z-10 h-full w-full overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] h-[40%] w-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] h-[40%] w-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
</div>
</body></html>
